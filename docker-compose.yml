services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: logguard-api
    ports:
      - "8000:8000"
    environment:
      PORT: "8000"
      HF_TOKEN: ${HF_TOKEN:-}
      HF_USE_REMOTE_EMBEDDINGS: ${HF_USE_REMOTE_EMBEDDINGS:-false}
      cors_origins: "http://localhost:8080,http://127.0.0.1:8080,http://localhost:5173,http://127.0.0.1:5173"

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: logguard-web
    ports:
      - "8080:80"
    depends_on:
      - api
